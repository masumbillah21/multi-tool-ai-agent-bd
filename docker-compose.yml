version: "3.9"

services:
  backend:
    build: ./backend
    container_name: bd_ai_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - MAX_SQL_ROWS=${MAX_SQL_ROWS}
      - INGEST_API_TOKEN=${INGEST_API_TOKEN}

  frontend:
    build: ./frontend
    container_name: bd_ai_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
